name: Promote edge -> stable

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Promote snap to stable
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMHUB_TOKEN }}
        run: |
          sudo snap install --classic charmcraft
          charmcraft promote --from-channel latest/edge --to-channel latest/stable --yes
