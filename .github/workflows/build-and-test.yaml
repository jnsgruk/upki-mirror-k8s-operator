name: Build/Test

on:
  workflow_call:
    inputs:
      publish:
        description: "Publish the ROCK to ghcr.io"
        type: boolean
        default: false
    secrets:
      CHARMHUB_TOKEN:
        required: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo snap install --classic astral-uv
      - name: Run linters
        run: make lint

  unit-test:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo snap install --classic astral-uv
      - name: Run tests
        run: make unit


  build-rock:
    name: Build Rock
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup LXD
        uses: canonical/setup-lxd@v1

      - name: Build ROCK
        run: |
          sudo snap install rockcraft --edge --classic
          rockcraft pack --verbose

      - name: Upload ROCK to ttl.sh
        if: ${{ !inputs.publish }}
        run: |
          sudo skopeo --insecure-policy copy \
            "oci-archive:$(realpath ./upki-mirror_*.rock)" \
            "docker://ttl.sh/upki-mirror-${{ github.run_id }}:2h" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

      - name: Get version
        if: ${{ inputs.publish }}
        id: get_version
        run: |
          version="$(yq '.version' rockcraft.yaml)"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Publish ROCK to ghcr.io
        if: ${{ inputs.publish }}
        run: |
          sudo skopeo --insecure-policy copy \
            "oci-archive:$(realpath ./upki-mirror_*.rock)" \
            "docker://ghcr.io/jnsgruk/upki-mirror:${{ steps.get_version.outputs.VERSION }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

          sudo skopeo --insecure-policy copy \
            "oci-archive:$(realpath ./upki-mirror_*.rock)" \
            "docker://ghcr.io/jnsgruk/upki-mirror:latest" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"

  pack-charm:
    name: Build charm
    runs-on: ubuntu-24.04
    needs:
      - build-rock
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup LXD
        uses: canonical/setup-lxd@main

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic

      - name: Cache wheels
        id: cache-wheels
        uses: actions/cache@v5
        with:
          path: /home/runner/snap/charmcraft/common/cache/charmcraft
          key: ${{ runner.os }}-wheel-cache-${{ hashFiles('./uv.lock') }}
          # If the above cache key doesn't match, it's because the uv.lock has changed.
          # Even so, pre-existing caches may still contain useful cached builds for some
          # portion of the dependencies, and restore-keys can partially match a cache.
          restore-keys: |
            ${{ runner.os }}-wheel-cache-

      - name: Pack charm
        run: charmcraft pack -v

      - name: Upload charm artifact
        uses: actions/upload-artifact@v7
        with:
          name: charm
          path: ./*.charm

  define-matrix:
    name: Define spread matrix
    runs-on: ubuntu-24.04
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic

      - name: Generate matrix list
        id: suites
        run: |
          list="$(charmcraft.spread --list lxd | sed "s|lxd:ubuntu-24.04:tests/spread/||g" | jq -r -ncR '[inputs | select(length>0)]')"
          echo "suites=$list"
          echo "suites=$list" >> $GITHUB_OUTPUT

  integration-test:
    name: Spread (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    needs:
      - define-matrix
      - lint
      - pack-charm
      - unit-test
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.define-matrix.outputs.suites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download charm artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v4
        with:
          name: charm

      - name: Setup LXD
        uses: canonical/setup-lxd@main

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic

      - name: Configure test ROCK resource
        if: ${{ !inputs.publish }}
        run: |
          yq -i '.resources.nginx-image.upstream-source = "ttl.sh/upki-mirror-${{ github.run_id }}:2h"' charmcraft.yaml

      - name: Run integration tests
        run: |
          charmcraft.spread -v "lxd:ubuntu-24.04:tests/spread/${{ matrix.suite }}"
